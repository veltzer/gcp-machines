gcp_configuration_name=machines

# Which identity google.auth should use in this repo:
#   default   -> your personal account (GOOGLE_APPLICATION_CREDENTIALS unset)
#   <name>    -> a service account (see gcp_sa_<name> in prompt_gcp docs)
#
# This project is administered as the project owner (your default account).
# The service account exists only for the deployed app, which gets its identity
# from GCP automatically (no local key), so we never use an SA key locally.
gcp_identity=default
