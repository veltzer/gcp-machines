name: build
on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
    - name: bootstrap-pip
      run: python -m pip install --upgrade pip
    - name: install-rsconstruct
      run: |
        curl -fsSL "https://github.com/veltzer/rsconstruct/releases/latest/download/rsconstruct-linux-x86_64" \
          -o /usr/local/bin/rsconstruct
        chmod +x /usr/local/bin/rsconstruct
        rsconstruct version
    - name: install-deps
      run: rsconstruct tools install-deps --yes
    - name: install-tools
      run: rsconstruct tools install --yes
    - name: install-requirements
      run: python -m pip install -r requirements.txt
    - name: build
      run: rsconstruct build
    - name: status
      run: rsconstruct status
