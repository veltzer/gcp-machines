<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Machines List</title>
		<style>
			.machine-container {
				display: flex;
				flex-direction: column;
			}
			.machine-row {
				display: flex;
				gap: 10px;
				margin-bottom: 10px; /* Add some space between rows */
			}
			.machine-info {
				font-size: 18px; /* Match the buttons */
				padding: 10px 20px; /* Add padding for better visual appeal */
				border: 1px solid #888;
				border-radius: 5px; /* Add rounded corners */
			}
			.machine-row button {
				cursor: pointer; /* Indicate clickable element */
				font-size: 18px; /* Increase font size */
				padding: 10px 20px; /* Add padding for better visual appeal */
				border-radius: 5px; /* Add rounded corners */
			}
		</style>
		<script>
			function copy(button, text) {
				navigator.clipboard.writeText(text);
				const originalText = button.textContent;
				button.textContent = 'Copied!';
				// Reset button after 2 seconds
				setTimeout(() => {
					button.textContent = originalText;
				}, 2000);
			}
		</script>
	</head>
	<body>
		{% if user %}
			<p class="signed-in">
				Signed in as {{user}}
				<a href="/?gcp-iap-mode=CLEAR_LOGIN_COOKIE">
					Logout
				</a>
			</p>
		{% endif %}
		<div class="machine-container">
			{% for machine in machines %}
				<div class="machine-row">
					<span class="machine-info">
						{{machine.status}}
						{{machine.owner}}
						{{machine.number}}
						{{machine.ip}}
					</span>
					<button onclick="copy(this,'{{machine.ip}}')">
						Copy IP
					</button>
					<form method="post" action="/process">
						<input type="hidden" name="name" value="{{machine.name}}">
						<input type="hidden" name="zone" value="{{machine.zone}}">
						<button type="submit">
							switch state
						</button>
					</form>
				</div>
			{% endfor %}
		</div>
	</body>
</html>
